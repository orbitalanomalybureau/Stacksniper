services:
  - type: web
    name: stacksniper-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stacksniper-db
          property: connectionString
        # Render provides postgres:// — we need postgresql+asyncpg://
        # Override manually in Render dashboard after first deploy
      - key: REDIS_URL
        fromService:
          type: redis
          name: stacksniper-redis
          property: connectionString
      - key: PORT
        value: "8000"
      - fromGroup: stacksniper-secrets

  - type: worker
    name: stacksniper-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: celery -A app.tasks.celery_app worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stacksniper-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: stacksniper-redis
          property: connectionString
      - fromGroup: stacksniper-secrets

  - type: web
    name: stacksniper-web
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        value: https://stacksniper-api.onrender.com

  - type: redis
    name: stacksniper-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

databases:
  - name: stacksniper-db
    plan: free
    databaseName: stacksniper
    user: stacksniper

envVarGroups:
  - name: stacksniper-secrets
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SPORTSDATA_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://stacksniper-web.onrender.com
